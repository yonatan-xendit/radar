version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(go):"
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      k8s:
        patterns:
          - "k8s.io/*"
          - "sigs.k8s.io/*"
      otel:
        patterns:
          - "go.opentelemetry.io/*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(npm):"
    cooldown:
      default-days: 7
      semver-major-days: 14

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(actions):"
    cooldown:
      default-days: 7
      semver-major-days: 14
