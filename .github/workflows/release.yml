name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  DOCKER_REPO: ghcr.io/skyhook-io/radar

jobs:
  release:
    name: Release Binaries
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}

      - name: Upload binaries for Docker job
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: |
            dist/radar_linux_amd64_v1/kubectl-radar
            dist/radar_linux_arm64_v8.0/kubectl-radar
          retention-days: 1

      - name: Update krew-index
        if: "!contains(github.ref_name, '-')"
        uses: rajatjindal/krew-release-bot@v0.0.51

      - name: Release summary
        if: always()
        run: |
          VERSION="${GITHUB_REF_NAME}"
          {
            echo "## CLI Release ${VERSION}"
            echo ""
            if [[ "$VERSION" == *-* ]]; then
              echo "> **Pre-release** — not published to Homebrew/Scoop/Krew/Helm"
              echo ""
            fi
            echo "### Assets"
            echo '```'
            ls -lh dist/*.tar.gz dist/*.zip 2>/dev/null | awk '{print $NF, $5}'
            echo '```'
            echo ""
            echo "### Checksums"
            echo '```'
            cat dist/checksums.txt 2>/dev/null || echo "not available"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v6

      - name: Download binaries
        uses: actions/download-artifact@v8
        with:
          name: binaries
          path: dist

      - name: Prepare binaries
        run: |
          cp dist/radar_linux_amd64_v1/kubectl-radar radar-amd64
          cp dist/radar_linux_arm64_v8.0/kubectl-radar radar-arm64
          chmod +x radar-amd64 radar-arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: tags
        run: |
          TAGS="${{ env.DOCKER_REPO }}:${{ needs.release.outputs.version }}"
          if [[ "${{ needs.release.outputs.is_prerelease }}" != "true" ]]; then
            TAGS="${TAGS},${{ env.DOCKER_REPO }}:latest"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          target: release
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  helm:
    name: Helm Chart
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.is_prerelease != 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Update Chart.yaml version
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" deploy/helm/radar/Chart.yaml
          sed -i "s/^version:.*/version: $VERSION/" deploy/helm/radar/Chart.yaml
          sed -i "s|image: ghcr.io/skyhook-io/radar:[^[:space:]]*|image: ghcr.io/skyhook-io/radar:$VERSION|" deploy/helm/radar/Chart.yaml

      - name: Push to helm-charts repo
        env:
          HELM_CHARTS_TOKEN: ${{ secrets.HELM_CHARTS_TOKEN }}
        run: |
          VERSION="${{ needs.release.outputs.version }}"

          git clone https://x-access-token:${HELM_CHARTS_TOKEN}@github.com/skyhook-io/helm-charts.git /tmp/helm-charts

          # Fail loudly if helm-charts already has this chart version. chart-releaser
          # would silently skip packaging on tag collision and users would never see
          # the new chart contents despite a successful push.
          if git -C /tmp/helm-charts tag -l "radar-$VERSION" | grep -q .; then
            echo "::error::helm-charts already has tag radar-$VERSION — bump the radar release version higher so chart-releaser packages a new chart."
            exit 1
          fi

          rm -rf /tmp/helm-charts/charts/radar
          cp -r deploy/helm/radar /tmp/helm-charts/charts/

          cd /tmp/helm-charts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/radar

          if git diff --staged --quiet; then
            echo "No changes to Helm chart"
          else
            git commit -m "Update radar chart to v$VERSION"
            git push origin main
          fi
