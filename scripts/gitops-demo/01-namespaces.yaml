# Demo namespaces — created up-front so the GitOps controllers can
# deploy into them without racing namespace creation. Each demo app
# below targets one of these so resources stay scoped.
apiVersion: v1
kind: Namespace
metadata:
  name: demo-healthy
  labels:
    radar-demo: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-drift
  labels:
    radar-demo: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-suspended
  labels:
    radar-demo: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-app-of-apps
  labels:
    radar-demo: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-set
  labels:
    radar-demo: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-flux
  labels:
    radar-demo: "true"
---
apiVersion: v1
kind: Namespace
metadata:
  name: demo-flux-helm
  labels:
    radar-demo: "true"
---
# Pre-created so guestbook-rollback can sync into a real namespace.
# guestbook-broken-* deliberately do NOT have their target namespaces
# pre-created — that's how we induce a stable Failed sync phase.
apiVersion: v1
kind: Namespace
metadata:
  name: demo-rollback
  labels:
    radar-demo: "true"
---
# Pre-created for the zombie Kustomization. The Kustomization itself is
# what lands in stuck-Terminating; the namespace stays so the zombie has
# a stable owner to point at.
apiVersion: v1
kind: Namespace
metadata:
  name: demo-zombie
  labels:
    radar-demo: "true"
