# Failed-HelmRelease fixture — helm-controller fails the chart pull
# because the version range matches nothing. Drives helm-specific UI
# surfaces that Kustomization doesn't share: lastAttemptedRevision
# (the version Flux *tried* to install) divergent from lastAppliedRevision,
# InstallFailed phase, and the retry counter inside status.history.
#
# Using `>=99.0.0` rather than a typo'd chart name because the latter
# fails at HelmChart pull (deeper in the source-controller) and produces
# a less informative UI state; the version-range approach keeps the
# failure inside helm-controller where the status surface is richer.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: podinfo-broken
  namespace: flux-system
spec:
  interval: 1m
  releaseName: podinfo-broken
  targetNamespace: demo-flux-helm
  chart:
    spec:
      chart: podinfo
      version: '>=99.0.0'  # no such version exists → InstallFailed
      sourceRef:
        kind: HelmRepository
        name: podinfo
        namespace: flux-system
      interval: 10m
  install:
    createNamespace: false
    remediation:
      retries: 3
