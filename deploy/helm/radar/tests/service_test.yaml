suite: Service
templates:
  - service.yaml
tests:
  - it: base service annotations (ci/values.yaml)
    asserts:
      - equal:
          path: metadata.annotations
          value:
            svc-annotation-key: svc-annotation-value
  - it: add new service annotation
    set:
      service:
        annotations:
          external-dns.kubernetes.io/hostname: radar.example.com
    asserts:
      - equal:
          path: metadata.annotations["external-dns.kubernetes.io/hostname"]
          value: radar.example.com
      - equal:
          path: metadata.annotations
          value:
            external-dns.kubernetes.io/hostname: radar.example.com
            svc-annotation-key: svc-annotation-value
  - it: override service annotation
    set:
      service:
        annotations:
          svc-annotation-key: radar.example.com
    asserts:
      - equal:
          path: metadata.annotations["svc-annotation-key"]
          value: radar.example.com
